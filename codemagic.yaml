workflows:
  ios-swiftui-workflow:
    name: iOS SwiftUI Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Build iOS App
        script: |
          xcodebuild build             -project ControleTerritorios.xcodeproj             -scheme ControleTerritorios             -sdk iphoneos             -derivedDataPath build             CODE_SIGNING_ALLOWED=NO             CODE_SIGNING_REQUIRED=NO
      - name: Zip Artifacts
        script: |
          cd build/Build/Products/Debug-iphoneos
          zip -r $CM_BUILD_DIR/ControleTerritorios.zip ControleTerritorios.app
    artifacts:
      - "*.zip"
